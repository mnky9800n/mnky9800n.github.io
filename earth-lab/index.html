<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>earth-lab.ai</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .main-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: normal;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        .contact {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        #earth {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
        }

        #earth:active {
            cursor: grabbing;
        }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px;
            font-size: 10px;
            z-index: 1000;
            max-width: 300px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
    
    <!-- Try different CDNs for Safari compatibility -->
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/earthjs@1.0.0/dist/earthjs.min.js"></script>
</head>
<body>
    <h1 class="main-title">earth-lab.ai</h1>
    <div class="contact">contact@earth-lab.ai</div>
    
    <div id="earth"></div>
    
    <div id="debug">Loading...</div>
    
    <script>
        var debugEl = document.getElementById('debug');
        var debugLines = [];
        
        function debug(msg) {
            console.log(msg);
            debugLines.push(msg);
            if (debugLines.length > 6) debugLines.shift();
            debugEl.innerHTML = debugLines.join('<br>');
        }
        
        debug('Loading libraries...');
        debug('D3: ' + (typeof d3 !== 'undefined'));
        debug('topojson: ' + (typeof topojson !== 'undefined'));
        debug('THREE: ' + (typeof THREE !== 'undefined'));
        debug('earthjs: ' + (typeof earthjs !== 'undefined'));
        
        // Wait longer for scripts to load on Safari
        setTimeout(function() {
            debug('Checking again after 2s...');
            debug('THREE: ' + (typeof THREE !== 'undefined'));
            debug('earthjs: ' + (typeof earthjs !== 'undefined'));
            
            if (typeof earthjs !== 'undefined' && typeof THREE !== 'undefined') {
                debug('✓ All libraries loaded!');
                createRealisticEarth();
            } else {
                debug('⚠ Some libraries still missing');
                
                // Try manual fallback loading
                if (typeof THREE === 'undefined') {
                    debug('Loading THREE.js fallback...');
                    loadThreeJSFallback();
                }
                if (typeof earthjs === 'undefined') {
                    debug('Loading earthjs fallback...');
                    loadEarthJSFallback();
                }
            }
        }, 2000);
        
        function createRealisticEarth() {
            try {
                var minDim = Math.min(window.innerWidth, window.innerHeight);
                var globeSize = Math.min(600, minDim * 0.7);
                
                // Create realistic Earth globe with actual geography
                var earth = earthjs({
                    width: globeSize,
                    height: globeSize
                })
                .register(earthjs.plugins.threejsPlugin())
                .register(earthjs.plugins.oceanThreejs('#4fc3f7'))
                .register(earthjs.plugins.worldThreejs('https://unpkg.com/world-atlas/world/110m.json', '#228b22'))
                .register(earthjs.plugins.autorotatePlugin(20))
                .register(earthjs.plugins.inertiaThreejs())
                .threejs('#earth');
                
                earth.ready(function() {
                    debug('World atlas data loaded...');
                    earth.create();
                    debug('Earth with continents created!');
                    
                    // Check if world data actually loaded
                    setTimeout(function() {
                        if (earth.worldThreejs && earth.worldThreejs.data()) {
                            debug('✓ Continents rendered successfully');
                        } else {
                            debug('⚠ World data may not have loaded');
                        }
                        
                        setTimeout(function() {
                            debugEl.style.display = 'none';
                        }, 2000);
                    }, 1000);
                });
                
            } catch (error) {
                debug('earthjs error: ' + error.message);
            }
        }
        
        // Fallback loading functions
        function loadThreeJSFallback() {
            var script = document.createElement('script');
            script.src = 'https://unpkg.com/three@0.128.0/build/three.min.js';
            script.onload = function() {
                debug('✓ THREE.js fallback loaded');
                checkAndCreate();
            };
            script.onerror = function() {
                debug('✗ THREE.js fallback failed');
            };
            document.head.appendChild(script);
        }
        
        function loadEarthJSFallback() {
            var script = document.createElement('script');
            script.src = 'https://github.com/earthjs/earthjs/releases/download/v1.0.0/earthjs.min.js';
            script.onload = function() {
                debug('✓ earthjs fallback loaded');
                checkAndCreate();
            };
            script.onerror = function() {
                debug('✗ earthjs fallback failed');
                debug('Trying basic SVG fallback...');
                createSVGFallback();
            };
            document.head.appendChild(script);
        }
        
        function checkAndCreate() {
            if (typeof earthjs !== 'undefined' && typeof THREE !== 'undefined') {
                debug('✓ Creating Earth with fallback libs');
                createRealisticEarth();
            }
        }
        
        // Basic SVG fallback if all else fails
        function createSVGFallback() {
            var earthDiv = document.getElementById('earth');
            earthDiv.innerHTML = '<div style="width: 400px; height: 400px; border-radius: 50%; background: linear-gradient(45deg, #4fc3f7, #228b22); animation: rotate 20s linear infinite;"></div>';
            debug('✓ Basic CSS Earth fallback active');
        }
        
        // Handle window resize
        window.addEventListener('resize', function() {
            // earthjs handles this automatically
        });
        
    </script>
</body>
</html>
