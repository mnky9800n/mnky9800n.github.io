<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>earth-lab.ai</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Courier New', monospace;
        background: #ffffff;
        color: #000000;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }
      
      .title {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: clamp(2rem, 8vw, 4rem);
        font-weight: normal;
        z-index: 100;
        pointer-events: none;
        user-select: none;
      }
      
      .contact {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(0.8rem, 3vw, 1.2rem);
        z-index: 100;
        pointer-events: none;
        user-select: none;
      }
      
      #earth-canvas {
        display: block;
        cursor: grab;
      }
      
      #earth-canvas:active {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <div class="title">earth-lab.ai</div>
    <div class="contact">contact@earth-lab.ai</div>
    
    <div id="earth-container"></div>
    
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script>
      let scene, camera, renderer, earth;
      let isDragging = false;
      let startX = 0, startY = 0;
      let rotationX = 0, rotationY = 0;
      
      function init() {
        // Scene
        scene = new THREE.Scene();
        
        // Camera
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // Renderer
        renderer = new THREE.WebGLRenderer({ 
          antialias: true, 
          alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffffff, 0);
        renderer.domElement.id = 'earth-canvas';
        document.getElementById('earth-container').appendChild(renderer.domElement);
        
        // Create Earth sphere
        const geometry = new THREE.SphereGeometry(2, 64, 64);
        const material = new THREE.MeshLambertMaterial({
          color: 0x228b22
        });
        
        earth = new THREE.Mesh(geometry, material);
        scene.add(earth);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(-1, 1, 1);
        scene.add(directionalLight);
        
        // Events
        setupEvents();
        
        // Start animation
        animate();
      }
      
      function setupEvents() {
        const canvas = renderer.domElement;
        
        canvas.addEventListener('mousedown', onPointerStart);
        canvas.addEventListener('mousemove', onPointerMove);
        canvas.addEventListener('mouseup', onPointerEnd);
        canvas.addEventListener('touchstart', onPointerStart, { passive: false });
        canvas.addEventListener('touchmove', onPointerMove, { passive: false });
        canvas.addEventListener('touchend', onPointerEnd);
        
        window.addEventListener('resize', onResize);
      }
      
      function onPointerStart(event) {
        isDragging = false;
        const clientX = event.clientX || (event.touches && event.touches[0].clientX);
        const clientY = event.clientY || (event.touches && event.touches[0].clientY);
        startX = clientX;
        startY = clientY;
      }
      
      function onPointerMove(event) {
        if (!startX || !startY) return;
        
        const clientX = event.clientX || (event.touches && event.touches[0].clientX);
        const clientY = event.clientY || (event.touches && event.touches[0].clientY);
        
        const deltaX = clientX - startX;
        const deltaY = clientY - startY;
        
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          isDragging = true;
          event.preventDefault();
          
          rotationY += deltaX * 0.01;
          rotationX += deltaY * 0.01;
          rotationX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotationX));
          
          startX = clientX;
          startY = clientY;
        }
      }
      
      function onPointerEnd(event) {
        if (!isDragging) {
          earth.material.color.setHex(0x4A90E2);
          setTimeout(() => {
            earth.material.color.setHex(0x228b22);
          }, 300);
        }
        startX = 0;
        startY = 0;
      }
      
      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      
      function animate() {
        requestAnimationFrame(animate);
        
        if (!isDragging) {
          rotationY += 0.005;
        }
        
        earth.rotation.x = rotationX;
        earth.rotation.y = rotationY;
        
        renderer.render(scene, camera);
      }
      
      window.addEventListener('load', init);
    </script>
  </body>
</html>
