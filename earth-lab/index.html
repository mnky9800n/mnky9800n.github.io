<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>earth-lab.ai</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .main-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: normal;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        .contact {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        #earth-canvas {
            display: block;
            cursor: grab;
        }

        #earth-canvas:active {
            cursor: grabbing;
        }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px;
            font-size: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <h1 class="main-title">earth-lab.ai</h1>
    <div class="contact">contact@earth-lab.ai</div>
    
    <div id="debug">Loading...</div>
    
    <script src="https://unpkg.com/three@0.167.0/build/three.min.js"></script>
    <script>
        var debugEl = document.getElementById('debug');
        
        function debug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg;
        }
        
        debug('THREE loaded: ' + (typeof THREE !== 'undefined'));
        
        if (typeof THREE === 'undefined') {
            debug('ERROR: THREE.js failed to load');
        } else {
            debug('Starting Three.js...');
            initThreeJS();
        }
        
        var scene, camera, renderer, earthGroup;
        var layers = [];
        var isExploded = false;
        var isDragging = false;
        var startX = 0, startY = 0;
        var rotationX = 0, rotationY = 0;
        
        function initThreeJS() {
            try {
                // Scene
                scene = new THREE.Scene();
                
                // Camera
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 4;
                
                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0xffffff, 0);
                renderer.domElement.id = 'earth-canvas';
                document.body.appendChild(renderer.domElement);
                
                // Earth group
                earthGroup = new THREE.Group();
                scene.add(earthGroup);
                
                // Create geological layers
                createLayers();
                
                // Lighting
                var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                var directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(-1, 1, 1);
                scene.add(directionalLight);
                
                // Events
                setupEvents();
                
                // Start animation
                animate();
                
                debug('Three.js initialized successfully!');
                
                setTimeout(function() {
                    debugEl.style.display = 'none';
                }, 2000);
                
            } catch (error) {
                debug('Three.js error: ' + error.message);
            }
        }
        
        function createLayers() {
            var layerData = [
                { name: 'inner_core', radius: 0.2, color: 0xffff99, opacity: 0.7, explodedDistance: 0 },
                { name: 'outer_core', radius: 0.35, color: 0xffcc00, opacity: 0.6, explodedDistance: 0.8 },
                { name: 'mantle', radius: 0.85, color: 0xff4500, opacity: 0.5, explodedDistance: 1.5 },
                { name: 'crust', radius: 1.0, color: 0x8b7355, opacity: 0.4, explodedDistance: 2.2 }
            ];
            
            for (var i = 0; i < layerData.length; i++) {
                var layerInfo = layerData[i];
                
                var geometry = new THREE.SphereGeometry(layerInfo.radius, 32, 32);
                var material = new THREE.MeshLambertMaterial({
                    color: layerInfo.color,
                    transparent: true,
                    opacity: layerInfo.opacity,
                    side: THREE.DoubleSide
                });
                
                var sphere = new THREE.Mesh(geometry, material);
                sphere.name = layerInfo.name;
                sphere.userData = {
                    explodedDistance: layerInfo.explodedDistance,
                    originalPosition: new THREE.Vector3(0, 0, 0)
                };
                
                layers.push(sphere);
                earthGroup.add(sphere);
            }
        }
        
        function setupEvents() {
            var canvas = renderer.domElement;
            
            canvas.addEventListener('mousedown', onPointerStart);
            canvas.addEventListener('mousemove', onPointerMove);
            canvas.addEventListener('mouseup', onPointerEnd);
            canvas.addEventListener('touchstart', onPointerStart);
            canvas.addEventListener('touchmove', onPointerMove);
            canvas.addEventListener('touchend', onPointerEnd);
            
            window.addEventListener('resize', onResize);
        }
        
        function onPointerStart(event) {
            isDragging = false;
            var clientX = event.clientX || (event.touches && event.touches[0].clientX);
            var clientY = event.clientY || (event.touches && event.touches[0].clientY);
            startX = clientX;
            startY = clientY;
        }
        
        function onPointerMove(event) {
            var clientX = event.clientX || (event.touches && event.touches[0].clientX);
            var clientY = event.clientY || (event.touches && event.touches[0].clientY);
            
            if (Math.abs(clientX - startX) > 5 || Math.abs(clientY - startY) > 5) {
                isDragging = true;
                event.preventDefault();
                
                var deltaX = clientX - startX;
                var deltaY = clientY - startY;
                
                rotationY += deltaX * 0.01;
                rotationX += deltaY * 0.01;
                rotationX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotationX));
                
                startX = clientX;
                startY = clientY;
            }
        }
        
        function onPointerEnd(event) {
            if (!isDragging) {
                toggleExploded();
            }
        }
        
        function toggleExploded() {
            isExploded = !isExploded;
            
            for (var i = 0; i < layers.length; i++) {
                var layer = layers[i];
                var targetZ = isExploded ? layer.userData.explodedDistance : 0;
                animateLayer(layer, targetZ);
            }
        }
        
        function animateLayer(layer, targetZ) {
            var startZ = layer.position.z;
            var startTime = Date.now();
            var duration = 1000;
            
            function animate() {
                var elapsed = Date.now() - startTime;
                var progress = Math.min(elapsed / duration, 1);
                var eased = 1 - Math.pow(1 - progress, 3);
                
                layer.position.z = startZ + (targetZ - startZ) * eased;
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Auto-rotation
            if (!isDragging) {
                rotationY += 0.005;
            }
            
            earthGroup.rotation.x = rotationX;
            earthGroup.rotation.y = rotationY;
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
