    <script>
      // --- 3D Simplex Noise (Ashima Arts) for GLSL ---
      const NOISE_GLSL = `
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

        float snoise(vec3 v) {
          const vec2 C = vec2(1.0/6.0, 1.0/3.0);
          const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
          vec3 i = floor(v + dot(v, C.yyy));
          vec3 x0 = v - i + dot(i, C.xxx);
          vec3 g = step(x0.yzx, x0.xyz);
          vec3 l = 1.0 - g;
          vec3 i1 = min(g.xyz, l.zxy);
          vec3 i2 = max(g.xyz, l.zxy);
          vec3 x1 = x0 - i1 + C.xxx;
          vec3 x2 = x0 - i2 + C.yyy;
          vec3 x3 = x0 - D.yyy;
          i = mod289(i);
          vec4 p = permute(permute(permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
          float n_ = 0.142857142857;
          vec3 ns = n_ * D.wyz - D.xzx;
          vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
          vec4 x_ = floor(j * ns.z);
          vec4 y_ = floor(j - 7.0 * x_);
          vec4 x = x_ * ns.x + ns.yyyy;
          vec4 y = y_ * ns.x + ns.yyyy;
          vec4 h = 1.0 - abs(x) - abs(y);
          vec4 b0 = vec4(x.xy, y.xy);
          vec4 b1 = vec4(x.zw, y.zw);
          vec4 s0 = floor(b0)*2.0 + 1.0;
          vec4 s1 = floor(b1)*2.0 + 1.0;
          vec4 sh = -step(h, vec4(0.0));
          vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
          vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
          vec3 p0 = vec3(a0.xy, h.x);
          vec3 p1 = vec3(a0.zw, h.y);
          vec3 p2 = vec3(a1.xy, h.z);
          vec3 p3 = vec3(a1.zw, h.w);
          vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
          p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
          vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);
          m = m * m;
          return 42.0 * dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
        }
      `;

      // --- Grass vertex shader ---
      const grassVertexShader = `
        ${NOISE_GLSL}

        uniform float uTime;
        uniform float uWindSpeed;
        uniform float uSway;
        uniform float uBladeHeight;

        varying float vHeight;
        varying vec3 vWorldNormal;
        varying vec3 vWorldPos;

        void main() {
          // Blade grows along +Y from 0 to uBladeHeight
          vHeight = clamp(position.y / uBladeHeight, 0.0, 1.0);

          // Get world-space base position from instance matrix
          vec4 worldBase = modelMatrix * instanceMatrix * vec4(0.0, 0.0, 0.0, 1.0);

          // Noise-based wind
          float noise = snoise(worldBase.xyz * 0.1 + uTime * uWindSpeed);
          float phase = uTime * 4.0 + noise * 6.28318;
          float heightFactor = vHeight * vHeight;

          float swingX = sin(phase) * heightFactor * uSway;
          float swingZ = cos(phase * 0.7) * heightFactor * uSway * 0.5;

          vec3 pos = position;
          pos.x += swingX * 0.2;
          pos.z += swingZ * 0.2;

          // Preserve blade length - bend don't stretch
          float originalH = position.y;
          float dx = swingX * 0.2;
          float dz = swingZ * 0.2;
          pos.y = sqrt(max(originalH * originalH - dx * dx - dz * dz, 0.0));

          vec4 worldPos = modelMatrix * instanceMatrix * vec4(pos, 1.0);
          vWorldPos = worldPos.xyz;
          vWorldNormal = normalize((modelMatrix * instanceMatrix * vec4(normal, 0.0)).xyz);

          gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
      `;

      // --- Grass fragment shader ---
      const grassFragmentShader = `
        uniform vec3 uColorA;   // tip color (pink)
        uniform vec3 uColorB;   // base color (dark)
        uniform vec3 uEmissive;
        uniform float uEmissiveIntensity;
        uniform vec3 uRimColor;
        uniform float uRimIntensity;
        uniform float uTime;

        varying float vHeight;
        varying vec3 vWorldNormal;
        varying vec3 vWorldPos;

        void main() {
          // Color gradient: dark at base, pink at tips
          float depthFactor = smoothstep(0.2, 1.0, 1.0 - vHeight);
          vec3 baseColor = mix(uColorA, uColorB, depthFactor);

          // Directional lighting (matches spotlight positions)
          vec3 lightDir1 = normalize(vec3(15.0, 15.0, -20.0) - vWorldPos);
          vec3 lightDir2 = normalize(vec3(-10.0, 15.0, 20.0) - vWorldPos);
          vec3 n = normalize(vWorldNormal);
          // Wrap lighting so back faces aren't fully dark
          float diff1 = max(dot(n, lightDir1), 0.0) * 0.6;
          float diff2 = max(dot(n, lightDir2), 0.0) * 0.3;
          float ambient = 0.25;
          float lighting = ambient + diff1 + diff2;

          vec3 litColor = baseColor * lighting;

          // Emissive glow
          vec3 emissive = uEmissive * uEmissiveIntensity;

          // Animated rim on tips
          float rimTip = smoothstep(0.0, 0.3, vHeight);
          vec3 rim = uRimColor * uRimIntensity * rimTip * (0.5 + 0.5 * sin(uTime * 0.5));

          gl_FragColor = vec4(litColor + emissive + rim, 1.0);
        }
      `;

      function loadLandMask() {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, img.width, img.height);
            resolve({ data: imageData.data, width: img.width, height: img.height });
          };
          img.src = LAND_MASK_DATA;
        });
      }

      function isLand(mask, phi, theta) {
        // phi [0, 2PI] -> longitude [-180, 180]
        // theta [0, PI] -> latitude [90, -90] (0=north pole)
        const lon = 180 - (phi / (2 * Math.PI)) * 360;
        const lat = 90 - (theta / Math.PI) * 180;
        let u = Math.floor(((lon + 180) / 360) * mask.width);
        let v = Math.floor(((90 - lat) / 180) * mask.height);
        u = Math.min(Math.max(u, 0), mask.width - 1);
        v = Math.min(Math.max(v, 0), mask.height - 1);
        return mask.data[(v * mask.width + u) * 4] > 128;
      }

      async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera directly above looking down
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 0);
        camera.up.set(0, 0, -1);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({
          antialias: true,
          powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.domElement.id = 'earth-canvas';
        document.getElementById('earth-container').appendChild(renderer.domElement);

        worldGroup = new THREE.Group();
        scene.add(worldGroup);

        const landMask = await loadLandMask();
        createPlanet(landMask);
        createGrass(landMask);
        setupLighting();
        setupEvents();

        // Orient so USA faces the camera (+Y)
        // Step 1: Rotate around Z to bring USA longitude to the +Y side
        const usaPhi = ((-97 + 180) / 360) * 2 * Math.PI;
        worldGroup.rotateZ(Math.PI / 2 - usaPhi);


        animate();
      }

      function createPlanet(mask) {
        // Build a colored canvas from the land mask
        var texCanvas = document.createElement('canvas');
        texCanvas.width = mask.width;
        texCanvas.height = mask.height;
        var texCtx = texCanvas.getContext('2d');
        var colored = texCtx.createImageData(mask.width, mask.height);
        var d = colored.data;
        for (var i = 0; i < mask.data.length; i += 4) {
          var land = mask.data[i] > 128;
          d[i]     = land ? 5   : 30;   // R
          d[i + 1] = land ? 60  : 58;   // G
          d[i + 2] = land ? 15  : 95;   // B
          d[i + 3] = 255;               // A
        }
        texCtx.putImageData(colored, 0, 0);

        // Emissive map: blue glow on ocean only, black on land
        var emCanvas = document.createElement('canvas');
        emCanvas.width = mask.width;
        emCanvas.height = mask.height;
        var emCtx = emCanvas.getContext('2d');
        var emData = emCtx.createImageData(mask.width, mask.height);
        var e = emData.data;
        for (var j = 0; j < mask.data.length; j += 4) {
          var isOcean = mask.data[j] <= 128;
          e[j]     = isOcean ? 255 : 0;    // R
          e[j + 1] = isOcean ? 255 : 0;    // G
          e[j + 2] = isOcean ? 255 : 0;    // B
          e[j + 3] = 255;
        }
        emCtx.putImageData(emData, 0, 0);

        var geometry = new THREE.SphereGeometry(PLANET_RADIUS, 64, 64);
        geometry.rotateX(-Math.PI / 2); // Align poles with Z axis to match grass
        geometry.rotateZ(Math.PI); // Shift texture 180° to align with grass
        var texture = new THREE.CanvasTexture(texCanvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.repeat.x = 1;
        texture.offset.x = 0.75;
        var emissiveTex = new THREE.CanvasTexture(emCanvas);
        emissiveTex.wrapS = THREE.RepeatWrapping;
        emissiveTex.repeat.x = 1;
        emissiveTex.offset.x = 0.75;
        var material = new THREE.MeshStandardMaterial({
          map: texture,
          emissiveMap: emissiveTex,
          emissive: '#2563eb',
          emissiveIntensity: 0.3,
          metalness: 0.18,
          roughness: 0.68
        });
        var planet = new THREE.Mesh(geometry, material);
        planet.receiveShadow = true;
        planet.castShadow = true;
        worldGroup.add(planet);

        // Green continent overlay - transparent ocean, bright green land
        var landCanvas = document.createElement('canvas');
        landCanvas.width = mask.width;
        landCanvas.height = mask.height;
        var landCtx = landCanvas.getContext('2d');
        var landImg = landCtx.createImageData(mask.width, mask.height);
        var ld = landImg.data;
        for (var k = 0; k < mask.data.length; k += 4) {
          var isLandPx = mask.data[k] > 128;
          ld[k]     = 5;    // R
          ld[k + 1] = 90;   // G
          ld[k + 2] = 20;   // B
          ld[k + 3] = isLandPx ? 255 : 0;  // transparent ocean
        }
        landCtx.putImageData(landImg, 0, 0);
        var landTex = new THREE.CanvasTexture(landCanvas);
        landTex.wrapS = THREE.RepeatWrapping;
        landTex.repeat.x = 1;
        landTex.offset.x = 0.75;
        var landGeom = new THREE.SphereGeometry(PLANET_RADIUS + 0.01, 64, 64);
        landGeom.rotateX(-Math.PI / 2);
        landGeom.rotateZ(Math.PI);
        var landMat = new THREE.MeshBasicMaterial({
          map: landTex,
          transparent: true,
          depthWrite: false
        });
        var landMesh = new THREE.Mesh(landGeom, landMat);
        worldGroup.add(landMesh);
      }

      function createGrass(landMask) {
        // Tapered plane blade - grows along +Y from origin
        const bW = 0.065;
        const bH = 0.5;
        const joints = 3;
        const grassGeometry = new THREE.PlaneGeometry(bW, bH, 2, joints);

        // Move pivot to base (bottom at y=0, tip at y=bH)
        grassGeometry.translate(0, bH / 2, 0);

        // Taper the blade toward the tip
        const pos = grassGeometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const y = pos.getY(i);
          const t = y / bH; // 0 at base, 1 at tip
          const taper = 1.0 - t * 0.8;
          pos.setX(i, pos.getX(i) * taper);
        }
        pos.needsUpdate = true;
        grassGeometry.computeVertexNormals();

        // Custom shader material
        const grassMaterial = new THREE.ShaderMaterial({
          uniforms: {
            uTime: { value: 0 },
            uWindSpeed: { value: 0.1 },
            uSway: { value: 1.0 },
            uBladeHeight: { value: bH },
            uColorA: { value: new THREE.Color('#4ade80') },
            uColorB: { value: new THREE.Color('#14532d') },
            uEmissive: { value: new THREE.Color('#22c55e') },
            uEmissiveIntensity: { value: 0.15 },
            uRimColor: { value: new THREE.Color('#86efac') },
            uRimIntensity: { value: 0.15 },
          },
          vertexShader: grassVertexShader,
          fragmentShader: grassFragmentShader,
          side: THREE.DoubleSide,
        });

        grassMesh = new THREE.InstancedMesh(grassGeometry, grassMaterial, GRASS_COUNT);
        grassMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

        // Place grass only on land using rejection sampling
        const upVec = new THREE.Vector3(0, 1, 0);
        const mat4 = new THREE.Matrix4();
        const quat = new THREE.Quaternion();

        let placed = 0;
        let attempts = 0;
        const MAX_ATTEMPTS = GRASS_COUNT * 12;

        while (placed < GRASS_COUNT && attempts < MAX_ATTEMPTS) {
          const phi = Math.random() * Math.PI * 2;
          const theta = Math.acos(1 - 2 * Math.random());
          attempts++;

          if (!isLand(landMask, phi, theta)) continue;

          const x = PLANET_RADIUS * Math.sin(theta) * Math.sin(phi);
          const y = -PLANET_RADIUS * Math.sin(theta) * Math.cos(phi);
          const z = -PLANET_RADIUS * Math.cos(theta);

          const normal = new THREE.Vector3(x, y, z).normalize();
          quat.setFromUnitVectors(upVec, normal);
          const twist = new THREE.Quaternion().setFromAxisAngle(normal, Math.random() * Math.PI * 2);
          quat.premultiply(twist);

          const scale = 0.65 + Math.random() * 0.35;
          mat4.compose(
            new THREE.Vector3(x, y, z),
            quat,
            new THREE.Vector3(scale, scale, scale)
          );

          grassMesh.setMatrixAt(placed, mat4);
          placed++;
        }

        grassMesh.count = placed;

        grassMesh.instanceMatrix.needsUpdate = true;
        worldGroup.add(grassMesh);
      }

      function setupLighting() {
        const ambientLight = new THREE.AmbientLight(0x404040, 0.2);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1.5 * Math.PI);
        spotLight.position.set(15, 15, -20);
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);

        const spotLight2 = new THREE.SpotLight(0xffffff, 0.85 * Math.PI);
        spotLight2.position.set(-10, 15, 20);
        scene.add(spotLight2);
      }

      function setupEvents() {
        const canvas = renderer.domElement;

        canvas.addEventListener('mousedown', onPointerStart);
        canvas.addEventListener('mousemove', onPointerMove);
        canvas.addEventListener('mouseup', onPointerEnd);
        canvas.addEventListener('mouseleave', onPointerEnd);
        canvas.addEventListener('touchstart', onPointerStart, { passive: false });
        canvas.addEventListener('touchmove', onPointerMove, { passive: false });
        canvas.addEventListener('touchend', onPointerEnd);

        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        window.addEventListener('resize', onResize);
      }

      // Keyboard rotation (WASD / arrows)
      const keysDown = {};

      function onKeyDown(e) {
        keysDown[e.key] = true;
      }

      function onKeyUp(e) {
        keysDown[e.key] = false;
      }

      function onPointerStart(event) {
        isDragging = true;
        const clientX = event.clientX || (event.touches && event.touches[0].clientX);
        const clientY = event.clientY || (event.touches && event.touches[0].clientY);
        startX = clientX;
        startY = clientY;
      }

      function onPointerMove(event) {
        if (!isDragging) return;

        const clientX = event.clientX || (event.touches && event.touches[0].clientX);
        const clientY = event.clientY || (event.touches && event.touches[0].clientY);

        const deltaX = clientX - startX;
        const deltaY = clientY - startY;

        if (Math.abs(deltaX) > 2 || Math.abs(deltaY) > 2) {
          event.preventDefault();
          // Dragging applies velocity — horizontal drag = Y rotation, vertical = X rotation
          velY += deltaX * 0.005;
          velX += deltaY * 0.005;
          startX = clientX;
          startY = clientY;
        }
      }

      function onPointerEnd() {
        isDragging = false;
        startX = 0;
        startY = 0;
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const delta = Math.min((now - lastTime) / 1000, 0.05); // cap at 50ms
        lastTime = now;
        time += delta;

        // Keyboard input
        let dx = 0, dy = 0;
        if (keysDown['ArrowUp'] || keysDown['w'] || keysDown['W']) dy += 1;
        if (keysDown['ArrowDown'] || keysDown['s'] || keysDown['S']) dy -= 1;
        if (keysDown['ArrowLeft'] || keysDown['a'] || keysDown['A']) dx -= 1;
        if (keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) dx += 1;

        // Apply keyboard acceleration
        velX += dy * ACCELERATION * delta;
        velY += dx * ACCELERATION * delta;

        // Friction decay
        const decay = Math.exp(-FRICTION * delta);
        velX *= decay;
        velY *= decay;

        // Clamp speed
        velX = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, velX));
        velY = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, velY));

        // Constant auto-rotation around Y (Earth's polar axis)
        const AUTO_SPIN = 0.15; // rad/s

        // Apply rotation via quaternion (world-space axes)
        if (worldGroup) {
          const qx = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(1, 0, 0), velX * delta
          );
          const qy = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(0, 1, 0), velY * delta
          );
          const qAuto = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(0, 0, 1), AUTO_SPIN * delta
          );
          worldGroup.quaternion.premultiply(qAuto);
          worldGroup.quaternion.premultiply(qx);
          worldGroup.quaternion.premultiply(qy);
        }

        // Update grass shader uniforms
        if (grassMesh) {
          grassMesh.material.uniforms.uTime.value = time;
          // Pulse emissive
          grassMesh.material.uniforms.uEmissiveIntensity.value =
            Math.cos(time * 0.1) * 0.09 + 0.4;
        }

        renderer.render(scene, camera);
      }

      window.addEventListener('load', init);
    </script>
  </body>
</html>
