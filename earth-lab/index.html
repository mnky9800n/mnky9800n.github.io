<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>earth-lab.ai</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .main-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: normal;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        .contact {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        #earth {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
        }

        #earth:active {
            cursor: grabbing;
        }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px;
            font-size: 10px;
            z-index: 1000;
            max-width: 300px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
    
    <!-- Load from GitHub via jsdelivr CDN (more reliable) -->
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/earthjs/earthjs@master/dist/earthjs.min.js" 
            onload="console.log('earthjs loaded successfully')" 
            onerror="console.log('earthjs failed to load')"></script>
</head>
<body>
    <h1 class="main-title">earth-lab.ai</h1>
    <div class="contact">contact@earth-lab.ai</div>
    
    <div id="earth"></div>
    
    <div id="debug">Loading...</div>
    
    <script>
        var debugEl = document.getElementById('debug');
        var debugLines = [];
        
        function debug(msg) {
            console.log(msg);
            debugLines.push(msg);
            if (debugLines.length > 6) debugLines.shift();
            debugEl.innerHTML = debugLines.join('<br>');
        }
        
        debug('Loading from GitHub via jsdelivr...');
        debug('D3: ' + (typeof d3 !== 'undefined'));
        debug('topojson: ' + (typeof topojson !== 'undefined'));
        debug('THREE: ' + (typeof THREE !== 'undefined'));
        debug('earthjs: ' + (typeof earthjs !== 'undefined'));
        
        // Wait for GitHub-hosted scripts to load
        setTimeout(function() {
            debug('GitHub load check:');
            debug('THREE: ' + (typeof THREE !== 'undefined'));
            debug('earthjs: ' + (typeof earthjs !== 'undefined'));
            
            if (typeof earthjs !== 'undefined' && typeof THREE !== 'undefined') {
                debug('✓ SUCCESS: Creating realistic Earth');
                createRealisticEarth();
            } else if (typeof THREE !== 'undefined') {
                debug('THREE loaded but earthjs failed');
                debug('Trying earthjs fallback...');
                loadEarthJSFallback();
            } else {
                debug('✗ FAILED: Using CSS fallback');
                createSVGFallback();
            }
        }, 2000);
        
        function createRealisticEarth() {
            try {
                var minDim = Math.min(window.innerWidth, window.innerHeight);
                var globeSize = Math.min(600, minDim * 0.7);
                
                // Create realistic Earth globe with actual geography
                var earth = earthjs({
                    width: globeSize,
                    height: globeSize
                })
                .register(earthjs.plugins.threejsPlugin())
                .register(earthjs.plugins.oceanThreejs('#4fc3f7'))
                .register(earthjs.plugins.worldThreejs('https://unpkg.com/world-atlas/world/110m.json', '#228b22'))
                .register(earthjs.plugins.autorotatePlugin(20))
                .register(earthjs.plugins.inertiaThreejs())
                .threejs('#earth');
                
                earth.ready(function() {
                    debug('World atlas data loaded...');
                    earth.create();
                    debug('Earth with continents created!');
                    
                    // Check if world data actually loaded
                    setTimeout(function() {
                        if (earth.worldThreejs && earth.worldThreejs.data()) {
                            debug('✓ Continents rendered successfully');
                        } else {
                            debug('⚠ World data may not have loaded');
                        }
                        
                        setTimeout(function() {
                            debugEl.style.display = 'none';
                        }, 2000);
                    }, 1000);
                });
                
            } catch (error) {
                debug('earthjs error: ' + error.message);
            }
        }
        
        // Try multiple earthjs sources
        function loadEarthJSFallback() {
            debug('Trying earthjs npm version...');
            var script = document.createElement('script');
            script.src = 'https://unpkg.com/earthjs@1.0.0/dist/earthjs.min.js';
            script.onload = function() {
                debug('✓ earthjs npm version loaded');
                if (typeof earthjs !== 'undefined') {
                    createRealisticEarth();
                } else {
                    debug('earthjs object still undefined');
                    createSVGFallback();
                }
            };
            script.onerror = function() {
                debug('npm version failed, trying direct...');
                loadDirectEarthJS();
            };
            document.head.appendChild(script);
        }
        
        function loadDirectEarthJS() {
            var script = document.createElement('script');
            script.src = 'https://earthjs.github.io/earthjs/dist/earthjs.min.js';
            script.onload = function() {
                debug('✓ Direct earthjs loaded');
                if (typeof earthjs !== 'undefined') {
                    createRealisticEarth();
                } else {
                    createSVGFallback();
                }
            };
            script.onerror = function() {
                debug('All earthjs sources failed');
                createSVGFallback();
            };
            document.head.appendChild(script);
        }
        
        // Use Earth emoji - looks more realistic than CSS shapes
        function createSVGFallback() {
            var earthDiv = document.getElementById('earth');
            var minDim = Math.min(window.innerWidth, window.innerHeight);
            var size = Math.min(300, minDim * 0.6);
            
            earthDiv.innerHTML = 
                '<div class="css-earth" style="' +
                'font-size: ' + size + 'px; ' +
                'line-height: 1; ' +
                'animation: rotate 20s linear infinite; ' +
                'cursor: grab; ' +
                'user-select: none; ' +
                'display: flex; ' +
                'align-items: center; ' +
                'justify-content: center;' +
                '">🌍</div>';
            
            // Add click interaction to Earth emoji
            var cssEarth = earthDiv.querySelector('.css-earth');
            if (cssEarth) {
                cssEarth.addEventListener('click', function() {
                    this.style.transform = 'scale(1.2)';
                    this.style.transition = 'transform 0.3s ease';
                    var self = this;
                    setTimeout(function() {
                        self.style.transform = 'scale(1)';
                    }, 300);
                });
            }
            
            debug('✓ Earth emoji fallback (shows real continents)');
        }
        
        // Handle window resize
        window.addEventListener('resize', function() {
            // earthjs handles this automatically
        });
        
    </script>
</body>
</html>
