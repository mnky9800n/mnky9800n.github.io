<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>earth-lab.ai</title>
    
    <!-- Use HTTPS CDN URLs for Safari compatibility -->
    <script type='text/javascript' src='https://d3js.org/d3.v4.min.js'></script>
    <script type='text/javascript' src='https://d3js.org/topojson.v3.min.js'></script>
    <script type='text/javascript' src='https://unpkg.com/earthjs@1.0.0/dist/earthjs.min.js'></script>
    
    <style media="screen">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Lucida Console', monospace;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .main-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: normal;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        .contact {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }

        /* earthjs globe positioning */
        #earth {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: grab;
            width: 300px;
            height: 300px;
        }

        #earth:active {
            cursor: grabbing;
        }

        /* earthjs styling from README example */
        .countries path {
            fill: rgb(117, 87, 57);
            stroke: rgb(80, 64, 39);
            stroke-linejoin: round;
            stroke-width: 1.5;
            opacity: 1;
        }
        
        .graticule path {
            fill: none;
            opacity: 0.2;
            stroke: black;
            stroke-width: 0.5;
        }

        /* Mobile specific */
        @media (max-width: 768px) {
            .main-title {
                font-size: 1.5rem;
            }
            
            .contact {
                bottom: 1rem;
                font-size: 0.8rem;
            }
            
            #earth {
                width: 250px;
                height: 250px;
            }
        }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            font-size: 12px;
            z-index: 1000;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">earth-lab.ai</h1>
        <svg id="earth"></svg>
        <div class="contact">contact@earth-lab.ai</div>
    </div>
    
    <div id="debug">Loading...</div>
    
    <script>
        var debugEl = document.getElementById('debug');
        
        function debug(msg) {
            console.log(msg);
            debugEl.innerHTML += msg + '<br>';
        }
        
        // Check if libraries loaded
        debug('User agent: ' + navigator.userAgent);
        debug('D3 loaded: ' + (typeof d3 !== 'undefined'));
        debug('topojson loaded: ' + (typeof topojson !== 'undefined'));
        debug('earthjs loaded: ' + (typeof earthjs !== 'undefined'));
        
        // Simple earthjs implementation
        function initEarth() {
            try {
                debug('Starting earthjs init...');
                
                if (typeof earthjs === 'undefined') {
                    debug('ERROR: earthjs not loaded');
                    return;
                }
                
                var g = earthjs()
                    .register(earthjs.plugins.graticuleSvg())
                    .register(earthjs.plugins.autorotatePlugin(10))
                    .register(earthjs.plugins.worldSvg('https://unpkg.com/world-atlas/world/110m.json'));
                    
                g.svg('#earth');
                
                debug('earthjs configured, waiting for ready...');
                
                g.ready(function() {
                    debug('earthjs ready, creating...');
                    g.create();
                    debug('earthjs created successfully!');
                    
                    // Hide debug after 3 seconds if successful
                    setTimeout(function() {
                        debugEl.style.display = 'none';
                    }, 3000);
                });
                
            } catch (error) {
                debug('ERROR: ' + error.message);
            }
        }
        
        // Wait for page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initEarth);
        } else {
            initEarth();
        }
    </script>
</body>
</html>
